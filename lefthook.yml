pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{js,jsx,ts,tsx,json,jsonc,css}"
      run: pnpm biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    types:
      glob: "*.{ts,tsx}"
      run: pnpm tsc --noEmit

pre-push:
  commands:
    trufflehog:
      run: |
        if command -v trufflehog >/dev/null 2>&1; then
          trufflehog git file://. --only-verified --fail --no-update
        else
          echo "trufflehog not installed; skipping secret scan"
        fi
